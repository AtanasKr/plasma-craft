<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlasmaCraft BG</title>
    <script>
        (function () {
            const theme = localStorage.getItem('theme') || 'light';
            const lang = localStorage.getItem('lang') || 'bg';
            document.documentElement.setAttribute('data-theme', theme);
            document.documentElement.setAttribute('lang', lang);
        })();
    </script>
    <link rel="stylesheet" href="style/style.css">
    <link rel="stylesheet" href="style/index.css">
</head>

<body>
    <!--NAV-->
    <nav class="nav">

        <!-- Language picker -->
        <div class="nav-side nav-side-left">
            <div class="lang-switch">
                <span data-lang="bg" onclick="setLang('bg')">BG</span>
                <span data-lang="en" onclick="setLang('en')">EN</span>
            </div>
        </div>

        <div class="nav-left">
            <a class="nav-pill active" href="./index.html" data-i18n="nav.home">Начало</a>
            <a class="nav-pill" href="./services.html" data-i18n="nav.services">Услуги</a>
        </div>

        <img src="assets/logo.png" alt="logo">

        <div class="nav-right">
            <a class="nav-pill" href="./about.html" data-i18n="nav.about">За нас</a>
            <a class="nav-pill" href="./contact.html" data-i18n="nav.contact">Контакти</a>
        </div>

        <!-- Theme toggle -->
        <div class="nav-side nav-side-right">
            <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙</button>
        </div>

        <!-- Hamburger button (mobile only) -->
        <button class="hamburger" id="hamburgerBtn" onclick="toggleMenu()" aria-label="Toggle menu">
            <span></span>
            <span></span>
            <span></span>
        </button>

    </nav>

    <!-- Mobile menu overlay -->
    <div class="mobile-menu" id="mobileMenu">
        <a class="nav-pill active" href="./index.html" data-i18n="nav.home">Начало</a>
        <a class="nav-pill" href="./services.html" data-i18n="nav.services">Услуги</a>
        <a class="nav-pill" href="./about.html" data-i18n="nav.about">За нас</a>
        <a class="nav-pill" href="./contact.html" data-i18n="nav.contact">Контакти</a>
        <div class="mobile-menu-controls">
            <div class="lang-switch">
                <span data-lang="bg" onclick="setLang('bg')">BG</span>
                <span data-lang="en" onclick="setLang('en')">EN</span>
            </div>
            <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
        </div>
    </div>

    <main class="main-content">
        <section class="two-column">
            <div class="column text-column">
                <p class="pointer-text">
                    <span class="line"></span>
                    <span data-i18n="hero.tagline">Прецизно метално изкуство</span>
                </p>
                <p class="slogan-info">
                    <span data-i18n="hero.line1">ИЗКОВАНО</span><br>
                    <span data-i18n="hero.line2.prefix">ОТ</span>
                    <span class="outline-text" data-i18n="hero.line2.fire">ОГЪН</span>
                    <span data-i18n="hero.line3">И</span><br>
                    <span data-i18n="hero.line4">СТОМАНА</span>
                </p>
                <p data-i18n="hero.description">
                    Изрязване с ЦНК плазма за стенно<br>
                    изкуство, надписи, декоративни панели и<br>
                    промишлено производство. Всеки разрез<br>
                    разказва история.
                </p>
                <div class="project-order">
                    <a href="#" class="project-order-link" data-i18n="hero.cta">
                        ПОРЪЧАЙ ПО ПРОЕКТ
                    </a>
                </div>
            </div>

            <div class="column image-column">
                <img src="assets/tree-front.png" alt="Plasma cutting machine">
                <button class="view-work-button" data-i18n="hero.viewWork">ВИЖ НАШАТА РАБОТА</button>
            </div>
        </section>
    </main>
    <script src="scripts/script.js"></script>
</body>

</html>
